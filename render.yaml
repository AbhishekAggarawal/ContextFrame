# ── ContextFrame Backend ── Render Blueprint ─────────────────────────────────
# Deploy this on Render.com (free tier) as a "Web Service"

services:
  - type: web
    name: contextframe-api
    runtime: python
    buildCommand: pip install -r Requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: WHISPER_MODEL
        value: small
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_STT_MODEL
        value: "saaras:v2.5"